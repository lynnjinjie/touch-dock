name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  publish:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS (Apple Silicon)
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macOS (Intel)
            os: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        run: pnpm check:release-version

      - name: Build frontend
        run: pnpm build

      - name: Test mobile controller
        run: pnpm test:mobile

      - name: Test Rust core
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TouchDock ${{ github.ref_name }}
          releaseBody: Download the installer for your platform from the assets below.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          releaseAssetNamePattern: TouchDock_[version]_[platform]_[arch].[ext]
          args: ${{ matrix.args }}
