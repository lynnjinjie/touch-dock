name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to package
        required: true
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  publish:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos
          - windows
        manual:
          - ${{ github.event_name == 'workflow_dispatch' }}
        include:
          - target: macos
            platform: macOS (Apple Silicon)
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - target: windows
            platform: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""
        exclude:
          - target: windows
            manual: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        run: pnpm check:release-version
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}

      - name: Build frontend
        run: pnpm build

      - name: Test mobile controller
        run: pnpm test:mobile

      - name: Test Rust core
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Generate release notes
        id: release_notes
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          {
            echo 'body<<TOUCHDOCK_RELEASE_NOTES'
            node tools/generate-release-notes.mjs
            echo 'TOUCHDOCK_RELEASE_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Validate optional macOS signing credentials
        if: matrix.target == 'macos'
        shell: bash
        env:
          ENABLE_APPLE_SIGNING: ${{ vars.ENABLE_APPLE_SIGNING }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ "$ENABLE_APPLE_SIGNING" != "true" ]]; then
            echo "Developer ID signing is disabled. Building with the configured ad-hoc identity."
            exit 0
          fi

          values=("$APPLE_CERTIFICATE" "$APPLE_CERTIFICATE_PASSWORD" "$APPLE_SIGNING_IDENTITY" "$APPLE_ID" "$APPLE_PASSWORD" "$APPLE_TEAM_ID")
          for value in "${values[@]}"; do
            if [[ -z "$value" ]]; then
              echo "ENABLE_APPLE_SIGNING is true, but one or more Apple signing secrets are missing."
              exit 1
            fi
          done

          certificate_path="$RUNNER_TEMP/touchdock-developer-id.p12"
          trap 'rm -f "$certificate_path"' EXIT
          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"; then
            echo "APPLE_CERTIFICATE is not valid Base64. Encode the exported .p12 file, not a downloaded .cer file."
            exit 1
          fi
          if ! openssl pkcs12 -in "$certificate_path" -passin env:APPLE_CERTIFICATE_PASSWORD -noout >/dev/null 2>&1; then
            echo "APPLE_CERTIFICATE is not a readable PKCS#12 archive or APPLE_CERTIFICATE_PASSWORD is incorrect."
            exit 1
          fi
          if ! openssl pkcs12 -in "$certificate_path" -passin env:APPLE_CERTIFICATE_PASSWORD -nocerts -nodes 2>/dev/null | grep -q -- "PRIVATE KEY"; then
            echo "APPLE_CERTIFICATE does not contain the private key required for code signing."
            exit 1
          fi
          subject="$(openssl pkcs12 -in "$certificate_path" -passin env:APPLE_CERTIFICATE_PASSWORD -clcerts -nokeys 2>/dev/null | openssl x509 -noout -subject 2>/dev/null || true)"
          if [[ "$subject" != *"Developer ID Application"* ]]; then
            echo "APPLE_CERTIFICATE must contain a Developer ID Application certificate and its private key."
            exit 1
          fi
          echo "Developer ID credentials passed preflight validation; signing and notarization are enabled."

      - name: Build and publish ad-hoc or Windows bundles
        if: matrix.target != 'macos' || vars.ENABLE_APPLE_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: TouchDock ${{ env.RELEASE_TAG }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          releaseAssetNamePattern: TouchDock_[version]_[platform]_[arch].[ext]
          args: ${{ matrix.args }}

      - name: Build and publish Developer ID macOS bundle
        if: matrix.target == 'macos' && vars.ENABLE_APPLE_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: TouchDock ${{ env.RELEASE_TAG }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          releaseAssetNamePattern: TouchDock_[version]_[platform]_[arch].[ext]
          args: ${{ matrix.args }}
