name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to package
        required: true
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  publish:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - macos
          - windows
        manual:
          - ${{ github.event_name == 'workflow_dispatch' }}
        include:
          - target: macos
            platform: macOS (Apple Silicon)
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - target: windows
            platform: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""
        exclude:
          - target: windows
            manual: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        run: pnpm check:release-version
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}

      - name: Build frontend
        run: pnpm build

      - name: Test mobile controller
        run: pnpm test:mobile

      - name: Test Rust core
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Generate release notes
        id: release_notes
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          {
            echo 'body<<TOUCHDOCK_RELEASE_NOTES'
            node tools/generate-release-notes.mjs
            echo 'TOUCHDOCK_RELEASE_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: TouchDock ${{ env.RELEASE_TAG }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          releaseAssetNamePattern: TouchDock_[version]_[platform]_[arch].[ext]
          args: ${{ matrix.args }}
