<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#f5f7f7">
    <title>TouchDock Remote</title>
    <link rel="icon" type="image/png" href="/remote/icon.png">
    <link rel="apple-touch-icon" href="/remote/icon.png">
    <link rel="stylesheet" href="/remote/style.css">
  </head>
  <body>
    <main class="remote-shell" data-state="connecting" id="remoteShell">
      <header class="app-header">
        <img class="brand-mark" src="/remote/icon.png" alt="">
        <div class="brand-copy"><strong>TouchDock</strong><span id="remoteSubtitle">Remote control</span></div>
        <div class="connection" id="connection" role="status" aria-live="polite"><i aria-hidden="true"></i><span id="connectionText">Connecting</span></div>
      </header>

      <section class="notice" id="notice" role="alert" hidden>
        <div><strong id="noticeTitle">Unable to connect</strong><p id="noticeBody">Scan the current QR code on your computer.</p></div>
        <button type="button" id="retryButton" hidden>Reconnect</button>
      </section>

      <nav class="tabs" role="tablist" aria-label="Remote controls">
        <button class="tab active" id="trackpadTab" type="button" role="tab" aria-selected="true" aria-controls="trackpadPanel" data-tab="trackpad">Trackpad</button>
        <button class="tab" id="keysTab" type="button" role="tab" aria-selected="false" aria-controls="keysPanel" data-tab="keys" tabindex="-1">Keys</button>
        <button class="tab" id="shortcutsTab" type="button" role="tab" aria-selected="false" aria-controls="shortcutsPanel" data-tab="shortcuts" tabindex="-1">Actions</button>
      </nav>

      <section class="panel trackpad-panel active" id="trackpadPanel" role="tabpanel" aria-labelledby="trackpadTab">
        <div class="trackpad" id="trackpad" aria-label="Trackpad area">
          <div class="trackpad-center" aria-hidden="true"><i></i><span>Move pointer</span></div>
          <div class="scroll-zone" id="scrollZone" aria-label="Vertical scroll area">
            <i aria-hidden="true"></i>
          </div>
        </div>
        <div class="click-row">
          <button class="click-button" type="button" data-click="left"><span aria-hidden="true">◉</span>Left click</button>
          <button class="click-button" type="button" data-click="right"><span aria-hidden="true">◎</span>Right click</button>
        </div>
        <div class="modifier-row" id="modifierRow" aria-label="Modifier keys">
          <button type="button" data-modifier="control" aria-label="Control">⌃</button>
          <button type="button" data-modifier="alt" aria-label="Option">⌥</button>
          <button type="button" data-modifier="shift" aria-label="Shift">⇧</button>
          <button type="button" data-modifier="meta" aria-label="Command">⌘</button>
        </div>
      </section>

      <section class="panel keys-panel" id="keysPanel" role="tabpanel" aria-labelledby="keysTab" hidden>
        <div class="text-entry">
          <input id="textInput" type="text" maxlength="128" autocomplete="off" autocapitalize="sentences" placeholder="Type on your computer" aria-label="Text to type on computer">
          <button id="sendTextButton" class="send-button" type="button" aria-label="Send text" title="Send text">↑</button>
        </div>
        <div class="direction-pad" aria-label="Arrow keys">
          <button class="key key-up" type="button" data-key="arrow_up" aria-label="Arrow up" title="Arrow up">↑</button>
          <button class="key key-left" type="button" data-key="arrow_left" aria-label="Arrow left" title="Arrow left">←</button>
          <button class="key key-down" type="button" data-key="arrow_down" aria-label="Arrow down" title="Arrow down">↓</button>
          <button class="key key-right" type="button" data-key="arrow_right" aria-label="Arrow right" title="Arrow right">→</button>
        </div>
        <div class="utility-keys" id="utilityKeys" aria-label="Keyboard keys">
          <button class="utility-key" type="button" data-key="escape"><span aria-hidden="true">×</span><small>Esc</small></button>
          <button class="utility-key" type="button" data-key="tab"><span aria-hidden="true">⇥</span><small>Tab</small></button>
          <button class="utility-key" type="button" data-key="space"><span aria-hidden="true">␣</span><small>Space</small></button>
          <button class="utility-key" type="button" data-key="backspace"><span aria-hidden="true">⌫</span><small>Delete</small></button>
          <button class="utility-key" type="button" data-key="enter"><span aria-hidden="true">↵</span><small>Enter</small></button>
        </div>
      </section>

      <section class="panel shortcuts-panel" id="shortcutsPanel" role="tabpanel" aria-labelledby="shortcutsTab" hidden></section>

      <footer class="secure-state"><span aria-hidden="true">●</span> Commands encrypted on this device</footer>
    </main>
    <script type="module" src="/remote/app.js"></script>
  </body>
</html>
